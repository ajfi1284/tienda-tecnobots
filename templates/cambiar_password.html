{% extends "base.html" %}

{% block content %}
<div class="password-container">
    <h2>{% if is_admin %}🔐 Cambiar contraseña de Administrador{% else %}🔐 Cambiar contraseña{% endif %}</h2>
    
    {% if success %}
        <div class="success-message">{{ success }}</div>
        <a href="{% if is_admin %}{{ url_for('admin_dashboard') }}{% else %}{{ url_for('perfil') }}{% endif %}" class="btn-back">← Volver</a>
    {% else %}
        <form method="POST" class="password-form">
            <div class="form-group">
                <label>Contraseña actual</label>
                <input type="password" name="current_password" required>
            </div>
            
            <div class="form-group">
                <label>Nueva contraseña</label>
                <input type="password" name="new_password" required>
            </div>
            
            <div class="form-group">
                <label>Confirmar nueva contraseña</label>
                <input type="password" name="confirm_password" required>
            </div>
            
            <button type="submit" class="btn-cambiar">💾 Cambiar contraseña</button>
        </form>
        
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}
    {% endif %}
</div>

<style>
    .password-container {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h2 {
        color: #1f4e6e;
        text-align: center;
        margin-bottom: 25px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
    }
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 25px;
        font-size: 1rem;
    }
    .btn-cambiar {
        background: #1f4e6e;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 25px;
        width: 100%;
        cursor: pointer;
        font-size: 1rem;
    }
    .success-message {
        background: #d4edda;
        color: #155724;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
    }
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        margin-top: 20px;
    }
    .btn-back {
        display: inline-block;
        background: #6c757d;
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        margin-top: 15px;
    }
</style>
{% endblock %}
