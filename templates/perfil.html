{% extends "base.html" %}

{% block content %}
<h2>Mi Perfil</h2>
<div class="perfil-container">
    <p><strong>Nombre:</strong> {{ perfil.nombre }} {{ perfil.apellido }}</p>
    <p><strong>Teléfono:</strong> {{ perfil.telefono }}</p>
    <p><strong>Correo:</strong> {{ email }}</p>
    <p><strong>Dirección:</strong> {{ perfil.direccion or 'No registrada' }}</p>
    <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar sesión</a>
</div>

<style>
    .perfil-container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        max-width: 500px;
        margin: 20px auto;
    }
    .btn-logout {
        display: inline-block;
        margin-top: 20px;
        background: #e63946;
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
    }
</style>
{% endblock %}
