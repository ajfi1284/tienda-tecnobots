{% extends "base.html" %}

{% block content %}
<div class="perfil-container">
    <h2>Mi Perfil</h2>
    <div class="perfil-info">
        <p><strong>Nombre:</strong> {{ current_user.nombre }} {{ current_user.apellido }}</p>
        <p><strong>Email:</strong> {{ current_user.email }}</p>
        <p><strong>Teléfono:</strong> {{ current_user.telefono }}</p>
    </div>
    <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar sesión</a>
</div>

<style>
    .perfil-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .perfil-info p {
        margin: 15px 0;
        padding: 10px;
        border-bottom: 1px solid #eee;
    }
    .btn-logout {
        display: inline-block;
        background: #dc3545;
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        margin-top: 20px;
    }
</style>
{% endblock %}
