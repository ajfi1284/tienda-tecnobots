<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña - TECNOBOTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f4e6e 0%, #2c7da0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #1f4e6e; text-align: center; margin-bottom: 25px; }
        label { font-weight: 600; margin-top: 10px; display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
        }
        button {
            background: #1f4e6e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .error { color: red; margin-top: 10px; text-align: center; }
        .success { color: green; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>🔐 Restablecer contraseña</h1>
        {% if success %}
            <div class="success">{{ success }}</div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="/login" style="color: #2c7da0;">Ir al inicio de sesión</a>
            </div>
        {% else %}
            <form method="POST">
                <label>Nueva contraseña</label>
                <input type="password" name="password" required>
                <label>Confirmar contraseña</label>
                <input type="password" name="confirm_password" required>
                <button type="submit">Cambiar contraseña</button>
            </form>
        {% endif %}
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
